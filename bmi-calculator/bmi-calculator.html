<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator BMI - VitaFit</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">VitaFit</div>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html">Acasă</a></li>
                <li><a href="bmi-calculator.html" class="active">Calculator BMI</a></li>
                <li><a href="../exercitii/exercitii.html">Exerciții Fizice</a></li>
                <li><a href="../nutritie/nutritie.html">Nutriție & Stil de Viață</a></li>
                <li><a href="../progres/progres.html">Progresul Tău</a></li>
                <li><a href="../profil/profil.html" class="profile-link">Profil</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="bmi-container">
            <h1 style="color: var(--primary-green); margin-bottom: 2rem; text-align: center;">Calculator BMI</h1>
            
            <form class="bmi-form" id="bmiForm">
                <div class="form-group">
                    <label for="sex">Sex:</label>
                    <select id="sex" required>
                        <option value="">Selectează</option>
                        <option value="male">Masculin</option>
                        <option value="female">Feminin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="weight">Greutate (kg):</label>
                    <input type="number" id="weight" step="0.1" min="1" max="300" required>
                </div>

                <div class="form-group">
                    <label for="height">Înălțime (cm):</label>
                    <input type="number" id="height" step="0.1" min="50" max="250" required>
                </div>

                <button type="submit" class="btn">Calculează BMI</button>
            </form>

            <div class="bmi-result" id="bmiResult">
                <div class="bmi-value" id="bmiValue"></div>
                <div class="bmi-interpretation" id="bmiInterpretation"></div>
                <a href="exercitii.html?category=slabit" class="exercise-link" id="exerciseLink" style="display: none;">Vezi planul nostru de exerciții pentru slăbit</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <h3>Contact</h3>
            <div class="social-icons">
                <a href="#" class="social-icon" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="#" class="social-icon" aria-label="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="#" class="social-icon" aria-label="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>
            </div>
            <p class="phone">Tel: +40 721 234 567</p>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="bmi-calculator.js"></script>
</body>
</html>
