<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutriție & Stil de Viață - VitaFit</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">VitaFit</div>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html">Acasă</a></li>
                <li><a href="../bmi-calculator/bmi-calculator.html">Calculator BMI</a></li>
                <li><a href="../exercitii/exercitii.html">Exerciții Fizice</a></li>
                <li><a href="../nutritie/nutritie.html" class="active">Nutriție & Stil de Viață</a></li>
                <li><a href="../progres/progres.html">Progresul Tău</a></li>
                <li><a href="../profil/profil.html" class="profile-link">Profil</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="nutrition-container">
            <h1 style="color: var(--primary-green); margin-bottom: 2rem; text-align: center;">Nutriție & Stil de Viață</h1>

            <!-- Articles Section (from API) -->
            <h2 style="color: var(--primary-green); margin-top: 2rem;">Articole</h2>
            <div class="articles-grid" id="articlesGrid">
                <p class="loading-text">Se încarcă articolele...</p>
            </div>

            <!-- Recipes / Posts Section (from API) -->
            <div class="recipes-section">
                <h2 style="color: var(--primary-green); margin-top: 3rem;">Rețete & Articole</h2>
                <div class="recipes-grid" id="recipesGrid">
                    <p class="loading-text">Se încarcă...</p>
                </div>
            </div>

            <!-- Recipe Detail -->
            <div class="recipe-detail" id="recipeDetail">
                <button class="btn back-button" onclick="hideRecipe()">Înapoi</button>
                <img id="recipeImage" src="" alt="">
                <h2 id="recipeTitle"></h2>
                <div id="recipeContent"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <h3>Contact</h3>
            <div class="social-icons">
                <a href="#" class="social-icon" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="#" class="social-icon" aria-label="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="#" class="social-icon" aria-label="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>
            </div>
            <p class="phone">Tel: +40 721 234 567</p>
        </div>
    </footer>

    <script src="../api.js"></script>
    <script src="../script.js"></script>
    <script src="nutritie.js"></script>
</body>
</html>
